<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de time</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/style.css">

</head>
<body>
  <header class="cabecalho">
    <h1>Time Radiant</h1>
  </header>

  <div class="container" id="galeria">
    <div class="item">
      <img class="imagem-galeria" src="" alt="Imagem 1">
      <p class="caption"><input class="player-name" id="player1" name="player1" type="text" value="Player 1" aria-label="Nome do jogador 1"></p>
    </div>

    <div class="item">
      <img class="imagem-galeria" src="" alt="Imagem 2">
      <p class="caption"><input class="player-name" id="player2" name="player2" type="text" value="Player 2" aria-label="Nome do jogador 2"></p>
    </div>

    <div class="item">
      <img class="imagem-galeria" src="" alt="Imagem 3">
      <p class="caption"><input class="player-name" id="player3" name="player3" type="text" value="Player 3" aria-label="Nome do jogador 3"></p>
    </div>

    <div class="item">
      <img class="imagem-galeria" src="" >
      <p class="caption"><input class="player-name" id="player4" name="player4" type="text" value="Player 4" aria-label="Nome do jogador 4"></p>
    </div>

    <div class="item">
      <img class="imagem-galeria" src="" alt="Imagem 5">
      <p class="caption"><input class="player-name" id="player5" name="player5" type="text" value="Player 5" aria-label="Nome do jogador 5"></p>
    </div>
</div>
<div class="meio">
  <button class="dota" id="botaoGerar">Gerar Time</button>
</div>

<script src="./JavaScript/script..js"></script>

</body>
</html>
